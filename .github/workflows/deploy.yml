name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
        env:
          # Public by design (anon/publishable key); security is via RLS + tokens.
          # See epics #71 (guest cloud) and #109 (auth). Vite embeds these at build
          # time, so each var the app reads MUST be listed here or it ships unset.
          # Cloud sync stays off until VITE_CLOUD_SYNC="on"; auth+roles until VITE_AUTH="on".
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_CLOUD_SYNC: ${{ vars.VITE_CLOUD_SYNC }}
          VITE_AUTH: ${{ vars.VITE_AUTH }}
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
